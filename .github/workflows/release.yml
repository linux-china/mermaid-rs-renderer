name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  verify-tag-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Ensure tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(awk -F'"' '/^version = "/ { print $2; exit }' Cargo.toml)"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
      - name: Ensure tagged commit is on master
        run: |
          git fetch --no-tags origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "Tagged commit $GITHUB_SHA is not reachable from origin/master"
            exit 1
          fi

  verify-release:
    needs: verify-tag-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/check_repo.py
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-features --lib --bins --tests --examples
      - run: cargo test --locked --no-default-features --lib
      - run: cargo test --locked --doc --all-features
      - run: cargo build --locked --release --features cli
      - run: python3 scripts/hard_gate.py
      - run: cargo publish --dry-run --locked

  build:
    needs: verify-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Verify binary version (unix)
        if: runner.os != 'Windows'
        run: |
          EXPECTED="mmdr ${GITHUB_REF_NAME#v}"
          ACTUAL="$(target/${{ matrix.target }}/release/mmdr --version)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Expected '$EXPECTED' but got '$ACTUAL'"
            exit 1
          fi
      - name: Verify binary version (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $expected = "mmdr $($env:GITHUB_REF_NAME.Substring(1))"
          $actual = (target\${{ matrix.target }}\release\mmdr.exe --version).Trim()
          if ($actual -ne $expected) {
            Write-Host "Expected '$expected' but got '$actual'"
            exit 1
          }
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mmdr${{ matrix.ext }} dist/
          tar -czf mmdr-${{ matrix.target }}.tar.gz -C dist .
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\\${{ matrix.target }}\\release\\mmdr.exe dist\\
          Compress-Archive -Path dist\\mmdr.exe -DestinationPath mmdr-${{ matrix.target }}.zip
      - uses: softprops/action-gh-release@v3
        with:
          files: mmdr-${{ matrix.target }}.*

  publish-crate:
    needs: [verify-tag-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - id: check-published
        name: Check if this version is already on crates.io
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          status="$(curl --retry 3 --retry-all-errors -sS -o crate-response.json -w '%{http_code}' \
            "https://crates.io/api/v1/crates/mermaid-rs-renderer/$VERSION")"
          case "$status" in
            200)
              echo "already_published=true" >> "$GITHUB_OUTPUT"
              echo "mermaid-rs-renderer $VERSION is already published on crates.io; skipping publish."
              ;;
            404)
              echo "already_published=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unexpected crates.io response: HTTP $status" >&2
              cat crate-response.json >&2
              exit 1
              ;;
          esac
      - name: Publish to crates.io
        if: steps.check-published.outputs.already_published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  update-homebrew:
    needs: [build, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download release assets and compute sha256
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/1jehuang/mermaid-rs-renderer/releases/download/${GITHUB_REF_NAME}"
          curl -fsSL "${BASE}/mmdr-x86_64-apple-darwin.tar.gz" -o macos-intel.tar.gz
          curl -fsSL "${BASE}/mmdr-aarch64-apple-darwin.tar.gz" -o macos-arm.tar.gz
          curl -fsSL "${BASE}/mmdr-x86_64-unknown-linux-gnu.tar.gz" -o linux-intel.tar.gz
          curl -fsSL "${BASE}/mmdr-aarch64-unknown-linux-gnu.tar.gz" -o linux-arm.tar.gz
          {
            echo "SHA_MACOS_INTEL=$(sha256sum macos-intel.tar.gz | cut -d' ' -f1)"
            echo "SHA_MACOS_ARM=$(sha256sum macos-arm.tar.gz | cut -d' ' -f1)"
            echo "SHA_LINUX_INTEL=$(sha256sum linux-intel.tar.gz | cut -d' ' -f1)"
            echo "SHA_LINUX_ARM=$(sha256sum linux-arm.tar.gz | cut -d' ' -f1)"
            echo "VERSION=${VERSION}"
          } >> "$GITHUB_ENV"
      - uses: actions/checkout@v6
        with:
          repository: 1jehuang/homebrew-mmdr
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-mmdr
      - name: Update formula
        run: .github/scripts/update-homebrew.sh
      - name: Commit and push
        run: |
          cd homebrew-mmdr
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mmdr.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update mmdr to v${VERSION}"
          git push

  update-aur:
    needs: [build, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compute sha256 for linux binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/1jehuang/mermaid-rs-renderer/releases/download/${GITHUB_REF_NAME}"
          curl -fsSL "${BASE}/mmdr-x86_64-unknown-linux-gnu.tar.gz" -o linux.tar.gz
          curl -fsSL "https://raw.githubusercontent.com/1jehuang/mermaid-rs-renderer/${GITHUB_REF_NAME}/LICENSE" -o LICENSE
          {
            echo "SHA_LINUX=$(sha256sum linux.tar.gz | cut -d' ' -f1)"
            echo "SHA_LICENSE=$(sha256sum LICENSE | cut -d' ' -f1)"
            echo "VERSION=${VERSION}"
          } >> "$GITHUB_ENV"
      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/mmdr-bin.git aur-mmdr
      - name: Update PKGBUILD and .SRCINFO
        run: .github/scripts/update-aur.sh
      - name: Commit and push to AUR
        run: |
          cd aur-mmdr
          git config user.name "Jeremy"
          git config user.email "jeremyhuang55555@gmail.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update mmdr-bin to v${VERSION}"
          git push
